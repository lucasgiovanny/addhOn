name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install test and runtime dependencies
        run: |
          # Home Assistant supplies aiohttp, so it is intentionally absent from the
          # integration manifest; standalone CI must install it explicitly.
          python -m pip install --upgrade pip pytest aiohttp
          python - <<'PY'
          import json
          import subprocess
          import sys

          with open("custom_components/addhon/manifest.json", encoding="utf-8") as file:
              requirements = json.load(file)["requirements"]
          subprocess.check_call(
              [sys.executable, "-m", "pip", "install", *requirements]
          )
          PY

      - name: Run tests
        run: python -m pytest tests/ -q

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Validate with hassfest
        uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c

  hacs:
    name: hacs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Validate with HACS
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa
        with:
          category: integration
          # Brand icons ship in custom_components/addhon/brand/ (HA 2026.3 brands
          # proxy); the HACS brands check passes on the local assets, so no
          # ignore is needed and the gate validates branding too.
